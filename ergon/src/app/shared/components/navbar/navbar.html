<header class="fixed top-0 left-0 right-0 h-16 flex items-center justify-between px-6 z-50 border-b" style="background-color: #042C53; border-color: #0a3d6b;">
  <button class="md:hidden text-white p-1 mr-2" (click)="menuClick.emit()">
  <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <line x1="3" y1="6" x2="21" y2="6"/>
    <line x1="3" y1="12" x2="21" y2="12"/>
    <line x1="3" y1="18" x2="21" y2="18"/>
  </svg>
</button>
  <div class="flex items-center gap-2">
    <div class="w-8 h-8 rounded-lg flex items-center justify-center" style="background-color: #185FA5;">
      <span class="text-white font-bold text-sm">E</span>
    </div>
    <span class="font-bold text-white text-lg">Ergon</span>
  </div>

  <div class="flex items-center gap-3">

    <button routerLink="/notifications" class="relative text-blue-200 hover:text-white transition p-1">      
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
        <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
      </svg>
      @if (notificationService.unreadCount() > 0) {
        <span class="absolute -top-1 -right-1 w-4 h-4 rounded-full text-white text-xs flex items-center justify-center" style="background-color: #dc2626;">
          {{ notificationService.unreadCount() }}
        </span>
      }
    </button>

    <div class="relative">
      <button (click)="toggleDropdown()" class="flex items-center gap-2 hover:opacity-80 transition">
        @if (avatarUrl()) {
          <img [src]="avatarUrl()" class="w-8 h-8 rounded-full object-cover" alt="avatar" />
        } @else {
          <div class="w-8 h-8 rounded-full flex items-center justify-center text-white text-xs font-bold" style="background-color: #185FA5;">
            {{ getInitials() }}
          </div>
        }
        <div class="text-left">
          <p class="text-white text-sm font-medium leading-none">{{ currentUser()?.firstName }}</p>
          <p class="text-blue-300 text-xs mt-0.5">{{ currentUser()?.role }}</p>
        </div>
      </button>
    </div>

    <!-- Logout -->
    <button (click)="logout()" class="text-blue-200 hover:text-white transition p-1" title="Logout">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
    </button>

  </div>
</header>
