<header class="fixed top-0 left-0 right-0 h-16 flex items-center justify-between px-6 z-50 border-b" style="background-color: #042C53; border-color: #0a3d6b;">
  <div class="flex items-center gap-2">
    <div class="w-8 h-8 rounded-lg flex items-center justify-center" style="background-color: #185FA5;">
      <span class="text-white font-bold text-sm">E</span>
    </div>
    <span class="font-bold text-white text-lg">Ergon</span>
  </div>

  <div class="flex items-center gap-4">
    <button class="relative text-blue-200 hover:text-white transition">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
        <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
      </svg>
      <span class="absolute -top-1 -right-1 w-4 h-4 rounded-full text-white text-xs flex items-center justify-center" style="background-color: #185FA5;">3</span>
    </button>

    <div class="h-6 w-px bg-blue-800"></div>

    <div class="relative">
      <button (click)="toggleDropdown()" class="flex items-center gap-2 hover:opacity-80 transition">
        <div class="w-8 h-8 rounded-full overflow-hidden bg-blue-300">
          <img src="/images/avatar-placeholder.jpg" alt="avatar" class="w-full h-full object-cover" onerror="this.style.display='none'" />
        </div>
        <div class="text-left">
          <p class="text-white text-sm font-medium leading-none">{{ currentUser()?.firstName }}</p>
          <p class="text-blue-300 text-xs mt-0.5">{{ currentUser()?.role }}</p>
        </div>
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-blue-300">
          <path d="m6 9 6 6 6-6"/>
        </svg>
      </button>

      @if (showDropdown()) {
        <div class="absolute right-0 top-12 w-40 rounded-lg shadow-lg border py-1" style="background-color: white; border-color: #E6F1FB;">
          <button (click)="logout()" class="w-full text-left px-4 py-2 text-sm hover:bg-gray-50 transition" style="color: #042C53;">
            Logout
          </button>
        </div>
      }
    </div>
  </div>
</header>
