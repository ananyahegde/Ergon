<div class="fixed bottom-6 right-6 flex flex-col gap-2 z-50">
  @for (toast of toastService.toasts(); track toast.id) {
    <div
      class="flex items-center justify-between gap-4 px-4 py-3 rounded-lg shadow-lg text-sm font-medium text-white min-w-64 max-w-sm"
      [style.background-color]="toast.type === 'success' ? '#16a34a' : '#dc2626'">
      <span>{{ toast.message }}</span>
      <button (click)="toastService.remove(toast.id)" class="opacity-70 hover:opacity-100 transition">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
  }
</div>
