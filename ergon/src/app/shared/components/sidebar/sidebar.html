<aside 
  class="fixed top-16 left-0 h-[calc(100vh-4rem)] w-56 flex flex-col justify-between py-6 px-3 z-40 transition-transform duration-300"
  [class]="isOpen() ? 'translate-x-0' : '-translate-x-full md:translate-x-0'"
  style="background-color: #042C53;">
  <nav class="flex flex-col gap-1">
    @for (item of visibleNavItems(); track item.route) {
      <a [routerLink]="item.route" routerLinkActive="active-nav" (click)="closeOnMobile()" class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-sm font-medium transition-all duration-150 text-blue-200 hover:text-white hover:bg-white/10">
        {{ item.label }}
      </a>
    }
  </nav>
  <div class="mx-2 p-4 rounded-xl" style="background-color: #0a3d6b;">
    <p class="text-white text-xs font-semibold mb-1">Need Help?</p>
    <p class="text-blue-300 text-xs">Contact your HR or IT support team.</p>
    <a href="#" class="text-xs font-semibold mt-2 inline-block" style="color: #E6F1FB;">Get Support</a>
  </div>
</aside>

@if (isOpen()) {
  <div class="fixed inset-0 bg-black/40 z-30 md:hidden" (click)="close()"></div>
}
