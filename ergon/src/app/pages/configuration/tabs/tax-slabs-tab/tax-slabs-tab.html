<div class="p-5 border-b flex items-center justify-end" style="border-color: #E6F1FB;">
  <button
    class="flex items-center gap-2 px-4 py-2 rounded-lg text-white text-sm font-medium"
    style="background-color: #042C53;"
    (click)="openAdd()">
    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
    Add Tax Slab
  </button>
</div>

@if (showForm()) {
  <div class="border-b p-5" style="border-color: #E6F1FB; background-color: #f8fbff;">
    <p class="text-sm font-semibold mb-4" style="color: #042C53;">
      {{ editingSlab() ? 'Edit Tax Slab' : 'New Tax Slab' }}
    </p>
    <div class="flex items-end gap-4 flex-wrap">
      <div class="flex flex-col gap-1.5">
        <label class="text-xs font-medium" style="color: #042C53;">Min Income</label>
        <input
          type="number"
          placeholder="0"
          min="0"
          class="px-3 py-2 text-sm border rounded-lg focus:outline-none focus:ring-2 w-40"
          style="border-color: #E6F1FB;"
          [value]="formMinIncome() ?? ''"
          (input)="formMinIncome.set(+$any($event.target).value)" />
      </div>
      <div class="flex flex-col gap-1.5">
        <label class="text-xs font-medium" style="color: #042C53;">Max Income</label>
        <input
          type="number"
          placeholder="0"
          min="0"
          class="px-3 py-2 text-sm border rounded-lg focus:outline-none focus:ring-2 w-40"
          style="border-color: #E6F1FB;"
          [value]="formMaxIncome() ?? ''"
          (input)="formMaxIncome.set(+$any($event.target).value)" />
      </div>
      <div class="flex flex-col gap-1.5">
        <label class="text-xs font-medium" style="color: #042C53;">Tax Percentage (%)</label>
        <input
          type="number"
          placeholder="0"
          min="0"
          max="100"
          class="px-3 py-2 text-sm border rounded-lg focus:outline-none focus:ring-2 w-36"
          style="border-color: #E6F1FB;"
          [value]="formTaxPercentage() ?? ''"
          (input)="formTaxPercentage.set(+$any($event.target).value)" />
      </div>
      <div class="flex items-center gap-2">
        <button
          class="px-4 py-2 text-sm rounded-lg border font-medium transition"
          style="border-color: #E6F1FB; color: #64748b;"
          (click)="closeForm()">
          Cancel
        </button>
        <button
          class="px-4 py-2 text-sm rounded-lg text-white font-medium disabled:opacity-50"
          style="background-color: #042C53;"
          [disabled]="saving() || !isFormValid()"
          (click)="save()">
          {{ saving() ? 'Saving...' : (editingSlab() ? 'Save Changes' : 'Create') }}
        </button>
      </div>
    </div>
  </div>
}

<table class="w-full">
  <thead>
    <tr class="text-xs font-semibold text-left" style="background-color: #f8fbff; color: #185FA5;">
      <th class="px-6 py-3">MIN INCOME</th>
      <th class="px-6 py-3">MAX INCOME</th>
      <th class="px-6 py-3">TAX PERCENTAGE</th>
      <th class="px-6 py-3 text-right">ACTIONS</th>
    </tr>
  </thead>
  <tbody>
    @for (slab of taxSlabs(); track slab.taxSlabId) {
      <tr class="border-t transition hover:bg-blue-50" style="border-color: #E6F1FB;">
        <td class="px-6 py-4 text-sm font-medium" style="color: #042C53;">{{ slab.minIncome | number }}</td>
        <td class="px-6 py-4 text-sm font-medium" style="color: #042C53;">{{ slab.maxIncome | number }}</td>
        <td class="px-6 py-4 text-sm text-gray-600">{{ slab.taxPercentage }}%</td>
        <td class="px-6 py-4 text-right">
          <button
            class="px-3 py-1.5 text-xs font-medium rounded-lg transition"
            style="background-color: #E6F1FB; color: #185FA5;"
            (click)="openEdit(slab)">
            Edit
          </button>
        </td>
      </tr>
    } @empty {
      <tr>
        <td colspan="4" class="px-6 py-12 text-center text-sm text-gray-400">No tax slabs found.</td>
      </tr>
    }
  </tbody>
</table>
